name: lts-npm-build-publish

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref/branch to build (use lts for LTS line)"
        required: true
        type: string
        default: "lts"
      publish_npm:
        description: "Publish npm tarball (@mmmbuto/codex-cli-lts)"
        required: true
        type: boolean
        default: false
      create_release:
        description: "Create/update GitHub release and upload assets"
        required: true
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag to use when publish_npm=true"
        required: true
        type: string
        default: "lts"
      release_tag:
        description: "Release tag (optional, defaults to v<package.version>)"
        required: false
        type: string
        default: ""

jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      ref_sha: ${{ steps.meta.outputs.ref_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - name: Resolve version/tag/sha
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import json
          with open("npm-package/package.json", "r", encoding="utf-8") as fh:
              print(json.load(fh)["version"])
          PY
          )"
          if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          else
            release_tag="v${version}"
          fi
          ref_sha="$(git rev-parse HEAD)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "ref_sha=${ref_sha}" >> "$GITHUB_OUTPUT"

  build-linux-x64:
    name: Build Linux x64 binaries
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs:
      - meta
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binaries
        run: cargo build --release --bin codex --bin codex-exec --target x86_64-unknown-linux-gnu

      - name: Stage Linux binaries + release asset
        shell: bash
        run: |
          set -euo pipefail

          out="${GITHUB_WORKSPACE}/dist/linux-x64"
          mkdir -p "${out}"
          cp "target/x86_64-unknown-linux-gnu/release/codex" "${out}/codex"
          cp "target/x86_64-unknown-linux-gnu/release/codex-exec" "${out}/codex-exec"

          rel="${GITHUB_WORKSPACE}/dist/release-assets"
          mkdir -p "${rel}"
          asset="codex-lts-linux-x64-v${{ needs.meta.outputs.version }}.tar.gz"
          tar -C "${out}" -czf "${rel}/${asset}" codex codex-exec
          sha256sum "${rel}/${asset}" | awk '{print $1}' > "${rel}/${asset}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-binaries
          path: dist/linux-x64/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-release-assets
          path: dist/release-assets/codex-lts-linux-x64-v${{ needs.meta.outputs.version }}.tar.gz*

  build-darwin-arm64:
    name: Build macOS arm64 binaries
    runs-on: macos-latest
    timeout-minutes: 45
    needs:
      - meta
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release binaries
        run: cargo build --release --bin codex --bin codex-exec --target aarch64-apple-darwin

      - name: Stage macOS binaries + release asset
        shell: bash
        run: |
          set -euo pipefail

          out="${GITHUB_WORKSPACE}/dist/darwin-arm64"
          mkdir -p "${out}"
          cp "target/aarch64-apple-darwin/release/codex" "${out}/codex"
          cp "target/aarch64-apple-darwin/release/codex-exec" "${out}/codex-exec"

          rel="${GITHUB_WORKSPACE}/dist/release-assets"
          mkdir -p "${rel}"
          asset="codex-lts-darwin-arm64-v${{ needs.meta.outputs.version }}.tar.gz"
          tar -C "${out}" -czf "${rel}/${asset}" codex codex-exec
          shasum -a 256 "${rel}/${asset}" | awk '{print $1}' > "${rel}/${asset}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-binaries
          path: dist/darwin-arm64/

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-release-assets
          path: dist/release-assets/codex-lts-darwin-arm64-v${{ needs.meta.outputs.version }}.tar.gz*

  package-npm:
    name: Pack and optionally publish npm LTS
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs:
      - meta
      - build-linux-x64
      - build-darwin-arm64
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: actions/download-artifact@v4
        with:
          name: linux-x64-binaries
          path: /tmp/lts-linux-x64

      - uses: actions/download-artifact@v4
        with:
          name: darwin-arm64-binaries
          path: /tmp/lts-darwin-arm64

      - name: Inject built binaries into npm package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p npm-package/bin/linux-x64 npm-package/bin/darwin-arm64

          cp /tmp/lts-linux-x64/codex npm-package/bin/linux-x64/codex
          cp /tmp/lts-linux-x64/codex-exec npm-package/bin/linux-x64/codex-exec
          cp /tmp/lts-darwin-arm64/codex npm-package/bin/darwin-arm64/codex
          cp /tmp/lts-darwin-arm64/codex-exec npm-package/bin/darwin-arm64/codex-exec

          chmod +x \
            npm-package/bin/linux-x64/codex \
            npm-package/bin/linux-x64/codex-exec \
            npm-package/bin/darwin-arm64/codex \
            npm-package/bin/darwin-arm64/codex-exec

      - name: Verify Termux binaries are present
        shell: bash
        run: |
          set -euo pipefail
          test -x npm-package/bin/android-arm64/codex
          test -x npm-package/bin/android-arm64/codex-exec

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: npm pack
        id: npm_pack
        shell: bash
        run: |
          set -euo pipefail
          cd npm-package
          tarball="$(npm pack)"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-lts-tarball
          path: npm-package/${{ steps.npm_pack.outputs.tarball }}

      - name: npm publish
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        working-directory: npm-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "${{ steps.npm_pack.outputs.tarball }}" --tag "${{ github.event.inputs.npm_tag }}"

  release-assets:
    name: Create/update GitHub release assets
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ github.event.inputs.create_release == 'true' }}
    needs:
      - meta
      - build-linux-x64
      - build-darwin-arm64
      - package-npm
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-x64-release-assets
          path: dist/release-assets/linux

      - uses: actions/download-artifact@v4
        with:
          name: darwin-arm64-release-assets
          path: dist/release-assets/darwin

      - uses: actions/download-artifact@v4
        with:
          name: npm-lts-tarball
          path: dist/npm

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.release_tag }}"
          target="${{ needs.meta.outputs.ref_sha }}"
          assets=(
            dist/release-assets/linux/*
            dist/release-assets/darwin/*
            dist/npm/*.tgz
          )

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" \
              --target "${target}" \
              --title "${tag}" \
              --notes "LTS release built from ref '${{ github.event.inputs.source_ref }}'."
          fi
